recipe: pretrain_tiny_mdlm
script: scripts/pretrain_diffusion.py
inputs:
  tokenizer: checkpoints/local_training/tokenizer.json
outputs:
  checkpoint_dir: checkpoints/local_training/diffusion
defaults:
  preset: mdlm-25m
  dataset: tinystories
  seq_len: 512
  max_steps: 1000
  warmup_steps: 50
  batch_size: 4
  lr: 0.0003
  max_examples: 10000
  grad_checkpoint: true
environment_overrides:
  TOKENIZER: tokenizer path
  PRESET: diffusion preset
  SAVE_DIR: checkpoint directory
  DATASET: pretraining dataset
  SEQ_LEN: token sequence length
  MAX_STEPS: training steps
  BATCH_SIZE: dataloader batch size
  MAX_EXAMPLES: dataset cap
